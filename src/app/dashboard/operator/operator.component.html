<section class="operator-page">
  <main class="operator-message-stage">
    <app-sn-result *ngIf="showResultPanel"></app-sn-result>

    <div *ngIf="!showResultPanel" class="status-card" [class.success]="successMessage" [class.error]="errorMessage">
      <ng-container *ngIf="successMessage || errorMessage; else emptyOperatorState">
        <div class="status-icon" aria-hidden="true">
          <span class="material-symbols-outlined">{{ successMessage ? 'thumb_up' : 'thumb_down' }}</span>
        </div>
        <p class="status-message">{{ successMessage || errorMessage }}</p>
      </ng-container>

      <ng-template #emptyOperatorState>
        <p class="empty-message">Enter a serial number below to pass this station.</p>
      </ng-template>
    </div>
  </main>

  <footer class="operator-footer" *ngIf="!showResultPanel">
    <div class="serial-entry">
      <label for="operatorSerial">Serial Number</label>
      <input
        id="operatorSerial"
        type="text"
        [(ngModel)]="serialNumber"
        name="operatorSerial"
        placeholder="Enter serial number"
        autocomplete="off"
        (keydown.enter)="passSerial()"
      />
    </div>

    <button type="button" class="pass-button" [class.passed]="isPassed" [disabled]="isPassing" (click)="passSerial()">
      {{ isPassing ? 'Entering...' : 'Enter' }}
    </button>
  </footer>
</section>
