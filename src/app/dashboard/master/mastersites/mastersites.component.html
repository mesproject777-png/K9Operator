<div class="sites-page">
  <div class="card">
    <h2>Plant</h2>

    <form [formGroup]="siteForm" (ngSubmit)="onSubmit()" class="sites-form">

      <div class="field">
        <label for="name">Plant Name</label>
        <input id="name" type="text" formControlName="name" />
        <div class="field-error" *ngIf="siteForm.get('name')?.invalid && siteForm.get('name')?.touched">
          Plant name is required
        </div>
      </div>


      <div class="actions">
        <button type="submit" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Saving...' : 'Add' }}
        </button>
      </div>
    </form>

    <p *ngIf="successMessage" class="message success">{{ successMessage }}</p>
    <p *ngIf="errorMessage" class="message error">{{ errorMessage }}</p>
  </div>

  <div class="card">
    <h3>Plant List</h3>

    <div class="search-box">
      <input
        type="text"
        placeholder="Search by plant name..."
        (input)="onSearchChange($any($event.target).value)"
      />
    </div>

    <p *ngIf="isLoading" class="message">Loading plants...</p>

    <table *ngIf="!isLoading">
      <thead>
        <tr>
          <th>ID</th>
          <th>Plant Name</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of filteredSites">
          <td>{{ item.id }}</td>
          <td>{{ item.name }}</td>
          <td class="row-actions">
            <button type="button" class="small-button" (click)="startEdit(item)">Edit</button>
            <button type="button" class="small-button secondary" (click)="deleteItem(item.id)">Delete</button>
          </td>
        </tr>
        <tr *ngIf="filteredSites.length === 0">
          <td colspan="3" class="empty-state">No plants found.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="isEditModalOpen" class="modal-backdrop" (click)="cancelEdit()">
    <div class="modal-card" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3>Edit Plant</h3>
        <button type="button" class="secondary" (click)="cancelEdit()">Close</button>
      </div>

      <form [formGroup]="editForm" class="sites-form modal-form">

        <div class="field">
          <label for="editName">Plant Name</label>
          <input id="editName" type="text" formControlName="name" />
          <div class="field-error" *ngIf="editForm.get('name')?.invalid && editForm.get('name')?.touched">
            Plant name is required
          </div>
        </div>

      </form>

      <div class="modal-actions">
        <button type="button" [disabled]="isEditSubmitting" (click)="saveEdit()">
          {{ isEditSubmitting ? 'Saving...' : 'Update' }}
        </button>
        <button type="button" class="secondary" (click)="cancelEdit()">Cancel</button>
      </div>
    </div>
  </div>
</div>
